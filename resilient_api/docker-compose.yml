networks:
  observability:
    driver: bridge

services:
  # -----------------------------------------------------------------------
  # Resilient API — RL + Bandit + fallback chain + circuit breaker
  # -----------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: resilient-api
    ports:
      - "5002:5002"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 512m
    cpus: 0.5
    environment:
      - PYTHONPATH=/app
      - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "tc qdisc add dev eth0 root netem loss 20% || true && python app.py"

  # -----------------------------------------------------------------------
  # Fragile API — no retries, no fallbacks, fixed failure probabilities
  # -----------------------------------------------------------------------
  fragile-api:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: fragile-api
    ports:
      - "5003:5003"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "python fragile_api.py"

  # -----------------------------------------------------------------------
  # Baseline API — retries + circuit breaker, no AI/RL
  # -----------------------------------------------------------------------
  baseline-api:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: baseline-api
    ports:
      - "5004:5004"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 256m
    cpus: 0.5
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "python baseline_api.py"

  # -----------------------------------------------------------------------
  # Adaptive API — function-specific chaos profiles + context-aware recovery
  # NEW: highlights function-level and context-aware chaos behaviour
  # -----------------------------------------------------------------------
  adaptive-api:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: adaptive-api
    ports:
      - "5005:5005"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 256m
    cpus: 0.5
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "python adaptive_api.py"

  # -----------------------------------------------------------------------
  # Locust — load tester for all four APIs
  # -----------------------------------------------------------------------
  locust:
    build:
      context: .
      dockerfile: dockerfile.locust.l
    container_name: locust-tester
    volumes:
      - .:/app
    ports:
      - "8090:8089"
    depends_on:
      - app
      - fragile-api
      - baseline-api
      - adaptive-api
    networks:
      - observability

  # -----------------------------------------------------------------------
  # Prometheus — scrapes all four APIs
  # -----------------------------------------------------------------------
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - .:/app
    ports:
      - "9090:9090"
    networks:
      - observability

  # -----------------------------------------------------------------------
  # Grafana — dashboards
  # -----------------------------------------------------------------------
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/datasources:/etc/grafana/provisioning/datasources
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - .:/app
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - observability

  # -----------------------------------------------------------------------
  # Loki + Promtail — log aggregation
  # -----------------------------------------------------------------------
  loki:
    image: grafana/loki:latest
    volumes:
      - .:/app
    ports:
      - "3100:3100"
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
    restart: always
    networks:
      - observability