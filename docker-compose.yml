networks:
  observability:
    driver: bridge

services:
  app:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: resilient-api
    ports:
      - "5002:5002"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 512m
    cpus: 0.5
    environment:
      - PYTHONPATH=/app/apis:/app
      - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "tc qdisc add dev eth0 root netem loss 20% || true && python apis/app.py"

  fragile-api:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: fragile-api
    ports:
      - "5003:5003"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 256m
    cpus: 0.5
    environment:
      - PYTHONPATH=/app/apis:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5003/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "python apis/fragile_api.py"

  baseline-api:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: baseline-api
    ports:
      - "5004:5004"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 256m
    cpus: 0.5
    environment:
      - PYTHONPATH=/app/apis:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "python apis/baseline_api.py"

  adaptive-api:
    build:
      context: .
      dockerfile: dockerfile.app
    container_name: adaptive-api
    ports:
      - "5005:5005"
    networks:
      - observability
    volumes:
      - .:/app
    restart: always
    mem_limit: 256m
    cpus: 0.5
    environment:
      - PYTHONPATH=/app/apis:/app
      - GROQ_API_KEY=${GROQ_API_KEY}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    command: >
      sh -c "python apis/adaptive_api.py"

  locust:
    build:
      context: .
      dockerfile: dockerfile.locust.l
    container_name: locust-tester
    volumes:
      - .:/app
    ports:
      - "8090:8089"
    depends_on:
      - app
      - fragile-api
      - baseline-api
      - adaptive-api
    networks:
      - observability
    command: locust -f /app/load_testing/locustfile.py --host=http://app:5002

  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - observability

  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000"
    volumes:
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    networks:
      - observability

  loki:
    image: grafana/loki:latest
    ports:
      - "3100:3100"
    networks:
      - observability

  promtail:
    image: grafana/promtail:latest
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml
      - /var/log:/var/log
    restart: always
    networks:
      - observability